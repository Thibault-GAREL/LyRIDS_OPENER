<svg viewBox="0 0 980 1080" xmlns="http://www.w3.org/2000/svg" width="980" height="1080" preserveAspectRatio="xMidYMid meet">
  <title>OPENER — Architecture (Detect → Embed → Type), current pipeline</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>

    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <!-- Background (pure white, no grid) -->
  <rect width="980" height="1080" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="50" font-size="18" font-weight="700" fill="#111827">OPENER — Architecture</text>
  <text x="40" y="71" font-size="12" font-weight="400" fill="#6B7280">Open Partitioning Embedding for NER  ·  pipeline Detect → Embed → Type  ·  no encoder trained from scratch</text>
  <line x1="40" y1="80" x2="320" y2="80" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>

  <!-- ============ 1. INPUT ============ -->
  <g>
    <rect x="290" y="100" width="380" height="54" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <text x="480" y="124" font-size="13" font-weight="600" fill="#92400E" text-anchor="middle">Raw text</text>
    <text x="480" y="142" font-size="11" font-weight="400" fill="#B45309" text-anchor="middle">« Marie Curie discovered radium in 1898. »</text>
  </g>

  <line x1="480" y1="154" x2="480" y2="182" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 2. MENTION DETECTION (GLiNER) ============ -->
  <g>
    <rect x="290" y="186" width="380" height="92" rx="10" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="290" y="186" width="4" height="92" rx="2" fill="#06B6D4"/>
    <text x="312" y="216" font-size="13" font-weight="600" fill="#164E63">GLiNER-L — Mention Detection</text>
    <text x="312" y="236" font-size="11" font-weight="400" fill="#0E7490">zero-shot span extractor · finds entity spans</text>
    <text x="312" y="256" font-size="11" font-weight="400" fill="#0E7490">also predicts a candidate label per span</text>
    <rect x="580" y="198" width="76" height="20" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="1"/>
    <text x="618" y="212" font-size="10" font-weight="600" fill="#0E7490" text-anchor="middle">❄ frozen</text>
  </g>

  <!-- arrow GLiNER -> Nomic + spans note -->
  <line x1="480" y1="278" x2="480" y2="312" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="700" y="288" width="240" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="820" y="304" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">spans : (start, end, text)</text>
  </g>
  <line x1="670" y1="300" x2="696" y2="300" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ 3. EMBEDDING (Nomic Matryoshka, fine-tuned) ============ -->
  <g>
    <rect x="290" y="316" width="380" height="100" rx="10" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="290" y="316" width="4" height="100" rx="2" fill="#0EA5E9"/>
    <text x="312" y="344" font-size="13" font-weight="600" fill="#075985">Nomic Embed v1.5 — Matryoshka</text>
    <text x="312" y="364" font-size="11" font-weight="400" fill="#0369A1">embeds each span in its context</text>
    <text x="312" y="384" font-size="11" font-weight="400" fill="#0369A1">sharpened for entity types (not frozen)</text>
    <rect x="312" y="392" width="150" height="18" rx="9" fill="#1E293B"/>
    <text x="387" y="405" font-size="9.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">truncate_dim 64→768</text>
    <rect x="470" y="392" width="186" height="18" rx="9" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1"/>
    <text x="563" y="405" font-size="9.5" font-weight="600" fill="#0369A1" text-anchor="middle">🔥 contrastive + hard-neg mining</text>
  </g>

  <!-- offline training (left) -> embedder -->
  <g>
    <rect x="40" y="318" width="226" height="96" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="40" y="318" width="4" height="96" rx="2" fill="#F59E0B"/>
    <text x="58" y="342" font-size="12" font-weight="600" fill="#92400E">Offline embedder training</text>
    <text x="58" y="361" font-size="9.5" font-weight="400" fill="#B45309">① Triplet contrastive · CoNLL · margin 1</text>
    <text x="58" y="378" font-size="9.5" font-weight="400" fill="#B45309">② Hard-neg mining · target train (cross-val)</text>
    <text x="58" y="398" font-size="9.5" font-weight="500" fill="#92400E">one-time · 65% hard · seen by no test label</text>
  </g>
  <line x1="266" y1="366" x2="286" y2="366" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>

  <!-- arrow Nomic -> typing + embedding note -->
  <line x1="480" y1="416" x2="480" y2="450" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="700" y="422" width="240" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="820" y="438" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">embedding  x ∈ ℝᴰ   (D = 64..768)</text>
  </g>
  <line x1="670" y1="434" x2="696" y2="434" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ 4. ENTITY TYPING (core, two operating points) ============ -->
  <g>
    <rect x="250" y="466" width="460" height="282" rx="14" fill="#8B5CF61A" stroke="#8B5CF666" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="262" y="456" width="220" height="24" rx="12" fill="#8B5CF6"/>
    <text x="372" y="472" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Entity Typing  ·  two operating points</text>

    <!-- (right) Supervised probe -->
    <g>
      <rect x="498" y="496" width="196" height="196" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="596" y="520" font-size="12" font-weight="700" fill="#991B1B" text-anchor="middle">OPENER-Sup</text>
      <rect x="528" y="530" width="136" height="19" rx="9.5" fill="#FFFFFF" stroke="#DC2626" stroke-width="1"/>
      <text x="596" y="543" font-size="9.5" font-weight="600" fill="#B91C1C" text-anchor="middle">supervised · needs labels</text>
      <text x="596" y="572" font-size="10.5" font-weight="500" fill="#B91C1C" text-anchor="middle">LinearSVC</text>
      <text x="596" y="589" font-size="10.5" font-weight="500" fill="#B91C1C" text-anchor="middle">class_weight = balanced</text>
      <text x="596" y="612" font-size="10" font-weight="400" fill="#B91C1C" text-anchor="middle">fit on each target's</text>
      <text x="596" y="628" font-size="10" font-weight="400" fill="#B91C1C" text-anchor="middle">training labels</text>
      <line x1="528" y1="644" x2="664" y2="644" stroke="#FECACA" stroke-width="1"/>
      <text x="596" y="664" font-size="11" font-weight="700" fill="#991B1B" text-anchor="middle">62.3 gold · 40.1 e2e</text>
      <text x="596" y="681" font-size="9.5" font-weight="400" fill="#B91C1C" text-anchor="middle">most accurate AMI</text>
    </g>

    <!-- (left) OPENER-ZS — selected (highlighted) -->
    <g>
      <rect x="266" y="496" width="196" height="196" rx="10" fill="#FEF9C3" stroke="#EAB308" stroke-width="2.5" filter="url(#shadow-md)"/>
      <text x="364" y="520" font-size="12" font-weight="700" fill="#854D0E" text-anchor="middle">OPENER-ZS<tspan baseline-shift="sub" font-size="8.5">trans</tspan> — zero-shot</text>
      <rect x="296" y="530" width="136" height="19" rx="9.5" fill="#FACC15"/>
      <text x="364" y="543" font-size="9.5" font-weight="700" fill="#713F12" text-anchor="middle">★ selected · no target labels</text>
      <text x="280" y="571" font-size="10" font-weight="400" fill="#854D0E">① label-name prototypes</text>
      <text x="364" y="587" font-size="9" font-weight="400" fill="#A16207" text-anchor="middle">cosine to type-name centroid</text>
      <text x="280" y="608" font-size="10" font-weight="400" fill="#854D0E">② transductive refine</text>
      <text x="364" y="624" font-size="9" font-weight="400" fill="#A16207" text-anchor="middle">spherical k-means on test</text>
      <text x="280" y="645" font-size="10" font-weight="600" fill="#854D0E">③ fuse GLiNER label  (β = 0.05)</text>
      <line x1="296" y1="654" x2="432" y2="654" stroke="#FDE68A" stroke-width="1"/>
      <text x="364" y="668" font-size="11" font-weight="700" fill="#854D0E" text-anchor="middle">39.5 e2e AMI</text>
      <text x="364" y="683" font-size="9.5" font-weight="600" fill="#A16207" text-anchor="middle">best zero-shot system</text>
    </g>

    <text x="480" y="726" font-size="10" font-weight="500" fill="#8B5CF6" text-anchor="middle">same pipeline · the typing head is the only target-fitted part · GMM is an ablation only</text>
    <text x="480" y="742" font-size="9.5" font-weight="400" fill="#64748B" text-anchor="middle">transductive refinement reported in the architecture search</text>
  </g>

  <!-- label names (left) -> ZS prototypes -->
  <g>
    <rect x="40" y="514" width="204" height="84" rx="10" fill="#FFFFFF" stroke="#EAB308" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="40" y="514" width="4" height="84" rx="2" fill="#EAB308"/>
    <text x="58" y="538" font-size="11.5" font-weight="600" fill="#854D0E">Label names (open set)</text>
    <text x="58" y="557" font-size="9.5" font-weight="400" fill="#A16207">person, location, scientist…</text>
    <text x="58" y="575" font-size="9.5" font-weight="400" fill="#A16207">embedded → type prototypes</text>
    <text x="58" y="591" font-size="9.5" font-weight="500" fill="#854D0E">no target annotation needed</text>
  </g>
  <line x1="244" y1="567" x2="266" y2="567" stroke="#EAB308" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>

  <!-- GLiNER candidate label -> ZS fusion (left chip) -->
  <g>
    <rect x="40" y="610" width="204" height="44" rx="10" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="40" y="610" width="4" height="44" rx="2" fill="#06B6D4"/>
    <text x="58" y="630" font-size="10.5" font-weight="600" fill="#164E63">Detector label + score</text>
    <text x="58" y="646" font-size="9.5" font-weight="400" fill="#0E7490">reused by step ③ (fusion, β)</text>
  </g>
  <line x1="244" y1="640" x2="266" y2="640" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)"/>

  <!-- arrow typing -> output -->
  <line x1="480" y1="748" x2="480" y2="786" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 5. OUTPUT ============ -->
  <g>
    <rect x="290" y="790" width="380" height="64" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow-md)"/>
    <text x="480" y="816" font-size="13" font-weight="600" fill="#065F46" text-anchor="middle">Typed entities</text>
    <text x="480" y="838" font-size="11" font-weight="400" fill="#047857" text-anchor="middle">(span, type)   e.g.  « Marie Curie » → scientist</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(40, 884)">
    <rect width="900" height="120" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="16" y="24" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">LEGEND</text>

    <rect x="16" y="36" width="14" height="14" rx="3" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="38" y="47" font-size="10" fill="#1E293B">Input / offline training</text>

    <rect x="16" y="60" width="14" height="14" rx="3" fill="#ECFEFF" stroke="#06B6D4"/>
    <text x="38" y="71" font-size="10" fill="#1E293B">Mention detection (frozen)</text>

    <rect x="16" y="84" width="14" height="14" rx="3" fill="#F0F9FF" stroke="#0EA5E9"/>
    <text x="38" y="95" font-size="10" fill="#1E293B">Embedding (contrastively fine-tuned)</text>

    <rect x="300" y="36" width="14" height="14" rx="3" fill="#FEE2E2" stroke="#DC2626"/>
    <text x="322" y="47" font-size="10" fill="#1E293B">OPENER-Sup (supervised typing, needs labels)</text>

    <rect x="300" y="60" width="14" height="14" rx="3" fill="#FEF9C3" stroke="#EAB308" stroke-width="2"/>
    <text x="322" y="71" font-size="10" fill="#1E293B">OPENER-ZS<tspan baseline-shift="sub" font-size="7.5">trans</tspan> — selected zero-shot head</text>

    <rect x="300" y="84" width="14" height="14" rx="3" fill="#ECFDF5" stroke="#10B981"/>
    <text x="322" y="95" font-size="10" fill="#1E293B">Output</text>

    <line x1="650" y1="43" x2="674" y2="43" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="682" y="47" font-size="10" fill="#1E293B">data flow</text>

    <line x1="650" y1="67" x2="674" y2="67" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="682" y="71" font-size="10" fill="#1E293B">init / side process</text>

    <line x1="650" y1="91" x2="674" y2="91" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="682" y="95" font-size="10" fill="#1E293B">detector label reused by fusion</text>
  </g>
</svg>
