<svg viewBox="0 0 940 1010" xmlns="http://www.w3.org/2000/svg" width="940" height="1010" preserveAspectRatio="xMidYMid meet">
  <title>Opener — Architecture (Detect → Embed → Cluster)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>

    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#E2E8F0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="940" height="1010" fill="#FFFFFF"/>
  <rect width="940" height="1010" fill="url(#grid)" opacity="0.6"/>

  <!-- Title -->
  <text x="40" y="50" font-size="18" font-weight="700" fill="#111827">Opener — Architecture</text>
  <text x="40" y="71" font-size="12" font-weight="400" fill="#6B7280">Open Partitioning Embedding for NER  ·  pipeline Detect → Embed → Cluster</text>
  <line x1="40" y1="80" x2="296" y2="80" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>

  <!-- ============ 1. INPUT ============ -->
  <g>
    <rect x="140" y="104" width="380" height="54" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <text x="330" y="128" font-size="13" font-weight="600" fill="#92400E" text-anchor="middle">Raw text</text>
    <text x="330" y="146" font-size="11" font-weight="400" fill="#B45309" text-anchor="middle">« Marie Curie discovered radium in 1898. »</text>
  </g>

  <!-- arrow input -> GLiNER -->
  <line x1="330" y1="158" x2="330" y2="186" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 2. MENTION DETECTION (GLiNER) ============ -->
  <g>
    <rect x="140" y="190" width="380" height="92" rx="10" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="140" y="190" width="4" height="92" rx="2" fill="#06B6D4"/>
    <text x="162" y="222" font-size="13" font-weight="600" fill="#164E63">GLiNER — Mention Detection</text>
    <text x="162" y="242" font-size="11" font-weight="400" fill="#0E7490">zero-shot span extractor · finds entities, no type</text>
    <text x="162" y="262" font-size="11" font-weight="400" fill="#0E7490">trained on Pile-NER · used as a black box</text>
    <!-- frozen badge -->
    <rect x="430" y="202" width="76" height="20" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="1"/>
    <text x="468" y="216" font-size="10" font-weight="600" fill="#0E7490" text-anchor="middle">❄ frozen</text>
  </g>

  <!-- arrow GLiNER -> Nomic + data annotation -->
  <line x1="330" y1="282" x2="330" y2="318" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="556" y="288" width="234" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="673" y="304" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">spans : (start, end, text)</text>
  </g>
  <line x1="520" y1="300" x2="552" y2="300" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ 3. EMBEDDING (Nomic Matryoshka) ============ -->
  <g>
    <rect x="140" y="322" width="380" height="92" rx="10" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="140" y="322" width="4" height="92" rx="2" fill="#0EA5E9"/>
    <text x="162" y="354" font-size="13" font-weight="600" fill="#075985">Nomic Embed v1.5 — Matryoshka</text>
    <text x="162" y="374" font-size="11" font-weight="400" fill="#0369A1">embeds the span in its context</text>
    <text x="162" y="394" font-size="11" font-weight="400" fill="#0369A1">truncatable representation, info-dense prefix</text>
    <!-- frozen + dim badges -->
    <rect x="392" y="334" width="76" height="20" rx="10" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1"/>
    <text x="430" y="348" font-size="10" font-weight="600" fill="#0369A1" text-anchor="middle">❄ frozen</text>
    <rect x="392" y="358" width="114" height="20" rx="10" fill="#1E293B"/>
    <text x="449" y="372" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">truncate_dim 64→768</text>
  </g>

  <!-- arrow Nomic -> Clusterer + data annotation -->
  <line x1="330" y1="414" x2="330" y2="452" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g>
    <rect x="556" y="420" width="234" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="673" y="436" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">embedding  x ∈ ℝᴰ   (D = 64..768)</text>
  </g>
  <line x1="520" y1="432" x2="552" y2="432" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ 4. LABEL CLUSTERER (core) ============ -->
  <g>
    <rect x="110" y="456" width="440" height="298" rx="14" fill="#6366F11A" stroke="#6366F166" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="122" y="446" width="210" height="24" rx="12" fill="#6366F1"/>
    <text x="227" y="462" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">LabelClusterer  ·  the core (trained)</text>

    <!-- GMM mini-boxes -->
    <g>
      <rect x="130" y="486" width="120" height="70" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="190" y="514" font-size="12" font-weight="600" fill="#5B21B6" text-anchor="middle">GMM · PER</text>
      <text x="190" y="533" font-size="10" font-weight="400" fill="#7C3AED" text-anchor="middle">K components</text>
    </g>
    <g>
      <rect x="270" y="486" width="120" height="70" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="330" y="514" font-size="12" font-weight="600" fill="#5B21B6" text-anchor="middle">GMM · LOC</text>
      <text x="330" y="533" font-size="10" font-weight="400" fill="#7C3AED" text-anchor="middle">K components</text>
    </g>
    <g>
      <rect x="410" y="486" width="120" height="70" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="470" y="514" font-size="12" font-weight="600" fill="#5B21B6" text-anchor="middle">GMM · ORG</text>
      <text x="470" y="533" font-size="10" font-weight="400" fill="#7C3AED" text-anchor="middle">K components</text>
    </g>

    <text x="330" y="578" font-size="10" font-weight="500" fill="#6366F1" text-anchor="middle">one Gaussian Mixture per declared label  ·  + K others …</text>
    <text x="330" y="596" font-size="10" font-weight="400" fill="#64748B" text-anchor="middle">each GMM scores   log p(x | label)</text>

    <!-- decision sub-block: argmax + OOD -->
    <g>
      <rect x="140" y="612" width="380" height="124" rx="10" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="330" y="638" font-size="13" font-weight="600" fill="#9F1239" text-anchor="middle">Decision</text>
      <text x="330" y="662" font-size="11" font-weight="500" fill="#BE123C" text-anchor="middle">label* = argmax  log p(x | label)</text>
      <text x="330" y="684" font-size="11" font-weight="400" fill="#BE123C" text-anchor="middle">if  log p(x | label*) &lt; threshold(label*)</text>
      <text x="330" y="702" font-size="11" font-weight="600" fill="#9F1239" text-anchor="middle">→  mark as OOD  (out-of-distribution)</text>
      <text x="330" y="722" font-size="10" font-weight="400" fill="#9F1239" text-anchor="middle">per-label threshold = p5 of training log-likelihoods</text>
    </g>
  </g>

  <!-- ============ ANCHOR INIT (side) ============ -->
  <g>
    <rect x="588" y="486" width="312" height="96" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <rect x="588" y="486" width="4" height="96" rx="2" fill="#F59E0B"/>
    <text x="606" y="510" font-size="12" font-weight="600" fill="#92400E">Anchor words init  (labels.yaml)</text>
    <text x="606" y="530" font-size="10" font-weight="400" fill="#B45309">person → [person, individual, human]</text>
    <text x="606" y="548" font-size="10" font-weight="400" fill="#B45309">→ mean of embeddings = means_init of GMM</text>
    <text x="606" y="568" font-size="10" font-weight="400" fill="#92400E">strong prior · EM then refines the bubble</text>
  </g>
  <!-- arrow anchor -> clusterer -->
  <line x1="588" y1="520" x2="552" y2="520" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>

  <!-- ============ POST-FIT (side) ============ -->
  <g>
    <rect x="588" y="612" width="312" height="124" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="600" y="602" width="150" height="22" rx="11" fill="#1E293B"/>
    <text x="675" y="617" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">post-fit analysis</text>
    <text x="606" y="646" font-size="11" font-weight="600" fill="#1E293B">🌳 Hierarchy inference</text>
    <text x="606" y="664" font-size="10" font-weight="400" fill="#475569">bubble A ⊃ bubble B (Mahalanobis containment)</text>
    <text x="606" y="682" font-size="10" font-weight="400" fill="#475569">→ person ⊃ scientist deduced automatically</text>
    <text x="606" y="706" font-size="11" font-weight="600" fill="#1E293B">❓ OOD regions</text>
    <text x="606" y="724" font-size="10" font-weight="400" fill="#475569">dense unknown zones → new label candidates</text>
  </g>
  <line x1="550" y1="660" x2="586" y2="660" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- arrow clusterer -> output -->
  <line x1="330" y1="754" x2="330" y2="792" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 5. OUTPUT ============ -->
  <g>
    <rect x="140" y="796" width="380" height="66" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow-md)"/>
    <text x="330" y="822" font-size="13" font-weight="600" fill="#065F46" text-anchor="middle">Typed entity</text>
    <text x="330" y="844" font-size="11" font-weight="400" fill="#047857" text-anchor="middle">(label, log-likelihood, is_ood, runner_ups)</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(40, 884)">
    <rect width="860" height="96" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="16" y="24" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">LEGEND</text>

    <rect x="16" y="36" width="14" height="14" rx="3" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="38" y="47" font-size="10" fill="#1E293B">Input / anchor init</text>

    <rect x="16" y="60" width="14" height="14" rx="3" fill="#ECFEFF" stroke="#06B6D4"/>
    <text x="38" y="71" font-size="10" fill="#1E293B">Mention detection (frozen)</text>

    <rect x="220" y="36" width="14" height="14" rx="3" fill="#F0F9FF" stroke="#0EA5E9"/>
    <text x="242" y="47" font-size="10" fill="#1E293B">Embedding (frozen)</text>

    <rect x="220" y="60" width="14" height="14" rx="3" fill="#F5F3FF" stroke="#8B5CF6"/>
    <text x="242" y="71" font-size="10" fill="#1E293B">GMM per label (trained)</text>

    <rect x="430" y="36" width="14" height="14" rx="3" fill="#FFF1F2" stroke="#F43F5E"/>
    <text x="452" y="47" font-size="10" fill="#1E293B">Decision + OOD filter</text>

    <rect x="430" y="60" width="14" height="14" rx="3" fill="#ECFDF5" stroke="#10B981"/>
    <text x="452" y="71" font-size="10" fill="#1E293B">Output</text>

    <line x1="640" y1="43" x2="664" y2="43" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="672" y="47" font-size="10" fill="#1E293B">data flow</text>

    <line x1="640" y1="67" x2="664" y2="67" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="672" y="71" font-size="10" fill="#1E293B">init / side process</text>
  </g>
</svg>
